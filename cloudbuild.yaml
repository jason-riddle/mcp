  # Uncomment and configure the following to directly call GitHub's Status API
  # Prerequisites:
  #   1. Create GitHub Personal Access Token with repo:status scope
  #   2. Store as secret environment variable in Cloud Build
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
