# Secret environment variables (uncomment if using direct API integration)
# availableSecrets:
#   secretManager:
#     - versionName: projects/$PROJECT_ID/secrets/github-token/versions/latest
#       env: 'GITHUB_TOKEN'

# Build options for optimization
options:
  # Use higher performance machine for faster builds
  machineType: 'E2_STANDARD_2'
  # Disk size for build
  diskSizeGb: 100

# Build timeout (20 minutes should be sufficient)
timeout: '1200s'

# Artifacts to store (optional - for debugging)
artifacts:
  objects:
    location: 'gs://${PROJECT_ID}_cloudbuild/artifacts'
    paths:
      - 'target/quarkus-app/quarkus-run.jar'

# Build logs location
logsBucket: 'gs://${PROJECT_ID}_cloudbuild/logs'
