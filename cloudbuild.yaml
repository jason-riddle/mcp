---
# Google Cloud Build configuration for Quarkus MCP Server
# This file defines the build pipeline for automated CI/CD
steps:
  # Step 1: Extract Maven version and create version+timestamp tag
  - name: 'maven:3.9.9-eclipse-temurin-17'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Extract Maven project version
        MAVEN_VERSION=$$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

        # Create timestamp (RFC3339-like format: YYYY-MM-DDTHH-MM-SSZ)
        TIMESTAMP=$$(date -u +%Y-%m-%dT%H-%M-%SZ)

        # Create unique tag with new format: {MAVEN_VERSION}-build-{BUILD_ID}-timestamp-{TIMESTAMP}
        UNIQUE_TAG="$${MAVEN_VERSION}-build-${BUILD_ID}-timestamp-$${TIMESTAMP}"

        # Save tag to workspace for next step
        echo "$${UNIQUE_TAG}" > /workspace/unique_tag.txt

        echo "Generated unique tag: $${UNIQUE_TAG}"
    id: 'generate-tags'

  # Step 2: Build and push with multiple tags
  - name: 'maven:3.9.9-eclipse-temurin-17'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Read unique tag from previous step
        UNIQUE_TAG=$$(cat /workspace/unique_tag.txt)

        echo "Building with unique tag: $${UNIQUE_TAG}"

        mvn clean package -DskipTests=true \
          -Dquarkus.container-image.build=true \
          -Dquarkus.container-image.push=true \
          -Dquarkus.container-image.registry=us-central1-docker.pkg.dev \
          -Dquarkus.container-image.group=${PROJECT_ID}/mcp-servers \
          -Dquarkus.container-image.name=jasons-mcp-server \
          -Dquarkus.container-image.tag="$${UNIQUE_TAG}"
    id: 'build-and-push'

  # Step 3: Deploy to Cloud Run using the unique tag
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Read unique tag from previous step
        UNIQUE_TAG=$$(cat /workspace/unique_tag.txt)

        echo "Deploying with unique tag: $${UNIQUE_TAG}"

        gcloud run deploy jasons-mcp-server \
          --image=us-central1-docker.pkg.dev/${PROJECT_ID}/mcp-servers/jasons-mcp-server:$${UNIQUE_TAG} \
          --region=us-central1 \
          --port=8080 \
          --no-allow-unauthenticated \
          --min-instances=0 \
          --max-instances=1 \
          --memory=512Mi \
          --cpu=1 \
          --timeout=300 \
          --quiet
    id: 'deploy-to-cloud-run'

  # Step 4: GitHub Status Integration Options (COMMENTED OUT)
  # The recommended approach is to use the official Google Cloud Build GitHub App
  # Install it at: https://github.com/apps/google-cloud-build
  # Docs: https://cloud.google.com/build/docs/automating-builds/github/build-repos-from-github
  # Alternative options are provided below but commented out

  # Option 1: Cloud Build Notifiers (More Control)
  # Source: https://github.com/GoogleCloudPlatform/cloud-build-notifiers
  # Docs: https://cloud.google.com/build/docs/configuring-notifications/configure-github
  # Reference: https://medium.com/google-cloud/sending-build-status-notification-from-google-container-builder-to-github-8adb33abba80
  # Uncomment and configure the following to use official Cloud Build Notifiers
  # Prerequisites:
  #   1. Create GitHub Personal Access Token with repo:status scope
  #   2. Store token in Secret Manager: gcloud secrets create github-token --data-file=-
