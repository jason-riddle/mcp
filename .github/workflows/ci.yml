---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting
        run: ./mvnw spotless:check --no-transfer-progress

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test --no-transfer-progress

        # - name: Upload test results
        #   uses: actions/upload-artifact@v4
        #   if: always()
        #   with:
        #     name: unit-test-results
        #     path: |
        #       target/surefire-reports/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: ./mvnw verify --no-transfer-progress

        # - name: Upload integration test results
        #   uses: actions/upload-artifact@v4
        #   if: always()
        #   with:
        #     name: integration-test-results
        #     path: |
        #       target/failsafe-reports/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format-check, checkstyle, unit-tests, integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build application
        run: ./mvnw clean package -DskipTests --no-transfer-progress

        # - name: Upload build artifacts
        #   uses: actions/upload-artifact@v4
        #   with:
        #     name: build-artifacts
        #     path: |
        #       target/quarkus-app/
        #       target/*.jar
        #     retention-days: 7
