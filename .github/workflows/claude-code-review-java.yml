---
name: Claude Code Review - Java

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      # Java source files
      - "src/**/*.java"

      # Build configuration
      - "pom.xml"
      - "Makefile"

      # Code quality configuration
      - "checkstyle.xml"
      - "checkstyle-suppressions.xml"

      # Resource files
      - "src/main/resources/**"
      - "src/test/resources/**"

jobs:
  claude-code-review-java:
    if: |
      github.actor == 'jason-riddle' &&
      (
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name == github.repository &&
         (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop')) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # - name: Claude Code Review
      #   uses: grll/claude-code-action@beta
      #   with:
      #     # OAuth authentication for Claude Max subscribers
      #     use_oauth: true
      #     claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
      #     claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
      #     claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
      #     secrets_admin_pat: ${{ secrets.SECRETS_ADMIN_PAT }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          timeout_minutes: "60"
          direct_prompt: |
            Please review this code change focusing on the modified Java files, build configuration, and resources.

            This is an MCP server with memory graph capabilities using Quarkus and Palantir Java Format standards.

            Focus on:
            - Code quality and Palantir Java Format compliance
            - Proper javadoc documentation
            - Final parameters and interface types
            - Single Responsibility Principle and method design
            - Memory graph domain model consistency
            - Potential bugs, performance, and security issues
            - Package organization and naming conventions

            For each issue, include the relevant code snippet with line numbers and a link to the specific line(s) in the file.

          # Optional: Add Java-specific tools for validation
          # allowed_tools: "Bash(./mvnw checkstyle:check),Bash(./mvnw spotless:check),Bash(./mvnw test),Bash(./mvnw compile)"
