# ==============================================================================
# Production Profile Configuration
# ==============================================================================

# ==============================================================================
# Production Logging Configuration
# ==============================================================================

# Standard production logging level
quarkus.log.level=INFO
quarkus.log.category."com.jasonriddle.mcp".level=INFO
quarkus.log.category."io.quarkiverse.mcp".level=INFO
quarkus.log.category."dev.langchain4j.mcp".level=INFO

# File logging enabled for production
quarkus.log.file.enable=true
quarkus.log.file.path=jasons-mcp-server.log

# ==============================================================================
# Production Container Configuration
# ==============================================================================

# Container image building disabled for production deployment
quarkus.container-image.build=false

# ==============================================================================
# Production Memory Configuration
# ==============================================================================

# Production memory file
memory.file.path=memory.jsonl
