# ==============================================================================
# Logging Configuration
# ==============================================================================

# Production logging level
quarkus.log.level=INFO
quarkus.log.category."com.jasonriddle.mcp".level=INFO
quarkus.log.category."io.quarkiverse.mcp".level=INFO
quarkus.log.category."dev.langchain4j.mcp".level=INFO

# File logging for production
quarkus.log.file.enable=true
quarkus.log.file.path=jasons-mcp-server-prod.log

