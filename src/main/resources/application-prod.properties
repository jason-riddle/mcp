# ==============================================================================
# Production Profile Configuration
# ==============================================================================

# ==============================================================================
# Core Application Configuration
# ==============================================================================

# Inherits from base application.properties

# ==============================================================================
# HTTP/Transport Configuration
# ==============================================================================

# Inherits from base application.properties

# ==============================================================================
# Logging Configuration
# ==============================================================================

# Production logging level
quarkus.log.level=INFO

# File logging for production
quarkus.log.file.enable=true
quarkus.log.file.path=jasons-mcp-server-prod.log

# ==============================================================================
# Debug Logging Configuration (Uncomment to enable)
# ==============================================================================

# Application-specific debug logging
# quarkus.log.category."com.jasonriddle.mcp".level=DEBUG
# quarkus.log.category."io.quarkiverse.mcp".level=DEBUG
# quarkus.log.category."dev.langchain4j.mcp".level=DEBUG

# ==============================================================================
# Container Configuration
# ==============================================================================

# Container image building disabled for production deployment
quarkus.container-image.build=false

# ==============================================================================
# Memory Configuration
# ==============================================================================

# Inherits from base application.properties

# ==============================================================================
# MCP Server Configuration
# ==============================================================================

# MCP traffic logging disabled for production
quarkus.mcp.server.traffic-logging.enabled=false
quarkus.mcp.server.traffic-logging.text-limit=500

# SSE endpoint configuration for production
quarkus.mcp.server.sse.root-path=/mcp

# ==============================================================================
# Security Configuration (Production)
# ==============================================================================

# GitHub OAuth configuration for production
%prod.quarkus.oidc.provider=github
%prod.quarkus.oidc.application-type=service
%prod.quarkus.oidc.client-id=${GITHUB_CLIENT_ID}
%prod.quarkus.oidc.credentials.secret=${GITHUB_CLIENT_SECRET}

# Login endpoint configuration (for obtaining tokens)
%prod.quarkus.oidc.login.provider=github
%prod.quarkus.oidc.login.client-id=${GITHUB_CLIENT_ID}
%prod.quarkus.oidc.login.credentials.secret=${GITHUB_CLIENT_SECRET}
