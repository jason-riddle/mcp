# ==============================================================================
# Heroku Profile Configuration
# ==============================================================================

# ==============================================================================
# Core Application Configuration
# ==============================================================================

# Inherits from base application.properties

# ==============================================================================
# HTTP Configuration
# ==============================================================================

# Use PORT environment variable from Heroku
quarkus.http.port=${PORT:8080}

# Bind to all interfaces (required for Heroku)
quarkus.http.host=0.0.0.0

# ==============================================================================
# Logging Configuration
# ==============================================================================

# Production logging level
quarkus.log.level=INFO

# Application-specific logging levels
# quarkus.log.category."com.jasonriddle.mcp".level=DEBUG
# quarkus.log.category."io.quarkiverse.mcp".level=DEBUG
# quarkus.log.category."dev.langchain4j.mcp".level=DEBUG

# Disable file logging for Heroku (use Heroku logs instead)
quarkus.log.file.enable=false

# ==============================================================================
# Container Configuration
# ==============================================================================

# Inherits from base application.properties

# ==============================================================================
# Memory Configuration
# ==============================================================================

# Memory persistence configuration - use Heroku ephemeral filesystem
# Note: This will be reset on dyno restart. For persistent storage,
# consider using Heroku Postgres or Redis add-ons
memory.file.path=/app/memory.jsonl

# ==============================================================================
# MCP Configuration
# ==============================================================================

# Ensure STDIO transport is enabled
quarkus.mcp.server.memory.stdio.enabled=true
