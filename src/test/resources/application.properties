# ==============================================================================
# Test Configuration
# ==============================================================================

# ==============================================================================
# Quarkus Test Configuration
# ==============================================================================

# Test profile configuration
quarkus.test.profile=test

# Test server configuration
quarkus.http.test-port=0

# ==============================================================================
# Test Logging Configuration
# ==============================================================================

# Reduce test log noise
quarkus.log.category."org.junit".level=ERROR

# Application-specific test logging
quarkus.log.category."com.jasonriddle.mcp.memory.MemoryService".level=INFO
quarkus.log.category."com.jasonriddle.mcp.memory.MemoryService".min-level=INFO
