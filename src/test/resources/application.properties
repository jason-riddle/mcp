# Test configuration
api.bearer.token=test-token

# Quarkus test configuration
quarkus.test.profile=test

# Reduce test log noise
quarkus.log.level=WARN
quarkus.log.console.level=WARN
quarkus.log.category."io.quarkus".level=WARN
quarkus.log.category."io.quarkiverse".level=WARN
quarkus.log.category."org.junit".level=WARN
quarkus.log.category."org.junit.jupiter.engine.descriptor".level=ERROR
quarkus.log.category."io.netty".level=ERROR
quarkus.log.category."io.vertx".level=ERROR
quarkus.log.category."org.jboss.resteasy.reactive.client".level=ERROR
quarkus.log.category."io.netty.util.Recycler".level=ERROR
quarkus.log.category."io.netty.buffer".level=ERROR
quarkus.log.category."io.netty.channel".level=ERROR
quarkus.log.category."io.vertx.core.http".level=ERROR
quarkus.log.category."jakarta.ws.rs".level=ERROR
quarkus.log.category."org.jboss.resteasy.reactive.client.handlers".level=ERROR
